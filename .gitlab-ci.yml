---
spec:
  inputs:
    interruptible:
      type: boolean
      default: true

---
default:
  interruptible: $[[ inputs.interruptible ]]

stages:
  - test

test:stylua:
  stage: test
  tags:
    - aarch64
  image:
    name: balenalib/aarch64-alpine:latest
    pull_policy: if-not-present
  before_script:
    - apk add stylua
  script:
    - stylua --check .

test:luacheck:
  stage: test
  tags:
    - aarch64
  image:
    name: balenalib/aarch64-alpine:latest
    pull_policy: if-not-present
  before_script:
    - apk add luacheck
  script:
    - luacheck --formatter=JUnit . > luacheck-report.xml
  artifacts:
    untracked: false
    when: on_success
    access: all
    reports:
      junit: luacheck-report.xml
